<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<defs>
  <!-- Deep space backdrop -->
  <radialGradient id="sky" cx="50%" cy="45%" r="75%">
    <stop offset="0%"   stop-color="#0c1e3a"/>
    <stop offset="55%"  stop-color="#060c18"/>
    <stop offset="100%" stop-color="#020407"/>
  </radialGradient>

  <!-- Portal glow — rises from center bottom -->
  <radialGradient id="portal" cx="50%" cy="100%" r="65%">
    <stop offset="0%"   stop-color="#00e5bb" stop-opacity="0.55"/>
    <stop offset="35%"  stop-color="#0099cc" stop-opacity="0.25"/>
    <stop offset="70%"  stop-color="#7c3aed" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
  </radialGradient>

  <!-- Left wing shadow depth -->
  <radialGradient id="wingL" cx="15%" cy="55%" r="50%">
    <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>

  <!-- Right wing shadow depth -->
  <radialGradient id="wingR" cx="85%" cy="55%" r="50%">
    <stop offset="0%"   stop-color="#22c55e" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
  </radialGradient>

  <!-- Horizontal title gradient -->
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00e5bb"/>
    <stop offset="40%"  stop-color="#ffffff"/>
    <stop offset="60%"  stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>

  <!-- Divider glow line -->
  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00e5bb" stop-opacity="0"/>
    <stop offset="25%"  stop-color="#00e5bb" stop-opacity="1"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="75%"  stop-color="#a855f7" stop-opacity="1"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </linearGradient>

  <!-- Nameplate shimmer -->
  <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00e5bb" stop-opacity="0.8"/>
    <stop offset="50%"  stop-color="#00e5bb"/>
    <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.8"/>
  </linearGradient>

  <!-- Filters -->
  <filter id="bigGlow" x="-40%" y="-80%" width="180%" height="260%">
    <feGaussianBlur stdDeviation="22" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="medGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur stdDeviation="14" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8"/>
  </filter>
  <filter id="wingBlur" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="4"/>
  </filter>
  <filter id="pBlur"><feGaussianBlur stdDeviation="2.5"/></filter>

  <!-- Clip for energy bar -->
  <clipPath id="barClip">
    <rect x="660" y="842" width="600" height="10" rx="5"/>
  </clipPath>
</defs>

<style>
  @keyframes breathe   { 0%,100%{opacity:.55} 50%{opacity:1}   }
  @keyframes breatheS  { 0%,100%{opacity:.4}  50%{opacity:.85} }
  @keyframes pulse3    { 0%,100%{opacity:.7;transform:scale(1)}   50%{opacity:1;transform:scale(1.025)} }
  @keyframes scanMove  { 0%{transform:translateY(-60px)} 100%{transform:translateY(1160px)} }
  @keyframes barFill   { 0%{width:0} 60%{width:600px} 80%{width:580px} 100%{width:600px} }
  @keyframes barPulse  { 0%,100%{opacity:.7} 50%{opacity:1} }
  @keyframes floatP    { 0%{opacity:0;transform:translateY(0)} 10%{opacity:.9} 85%{opacity:.5} 100%{opacity:0;transform:translateY(-340px)} }
  @keyframes twinkle   { 0%,100%{opacity:.2} 50%{opacity:.8} }
  @keyframes runeRot   { to{transform:rotate(360deg)}  }
  @keyframes runeRotR  { to{transform:rotate(-360deg)} }
  @keyframes flicker   { 0%,95%,100%{opacity:1} 96%{opacity:.6} 97.5%{opacity:1} }

  .sky-pulse  { animation: breatheS 6s ease-in-out infinite; }
  .wing-l     { animation: breatheS 7s ease-in-out infinite 1s; }
  .wing-r     { animation: breatheS 8s ease-in-out infinite 2s; }
  .portal-orb { animation: breathe  3s ease-in-out infinite; }
  .title-txt  { animation: pulse3   4s ease-in-out infinite; transform-origin: 960px 540px; }
  .scan       { animation: scanMove 10s linear infinite; }
  .energy-bar { animation: barFill  6s ease-in-out infinite, barPulse 2s ease-in-out infinite; }
  .bar-bg     { animation: barPulse 2s ease-in-out infinite; }
  .rune1      { animation: runeRot  24s linear infinite; transform-origin: 960px 1080px; }
  .rune2      { animation: runeRotR 32s linear infinite; transform-origin: 960px 1080px; }
  .flicker    { animation: flicker  8s ease-in-out infinite; }
</style>

<!-- ═══ LAYER 1: SKY ═══ -->
<rect width="1920" height="1080" fill="url(#sky)"/>

<!-- Star field -->
<g opacity=".6">
  <circle cx="142"  cy="87"  r="1" fill="white"><animate attributeName="opacity" values=".2;.9;.2" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="380"  cy="44"  r="1.3" fill="white"><animate attributeName="opacity" values=".1;.7;.1" dur="4.4s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="620"  cy="120" r=".9" fill="#00e5bb"><animate attributeName="opacity" values=".2;.8;.2" dur="2.8s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="900"  cy="55"  r="1.1" fill="white"><animate attributeName="opacity" values=".1;.9;.1" dur="5s"   repeatCount="indefinite" begin="2s"/></circle>
  <circle cx="1180" cy="90"  r="1"   fill="white"><animate attributeName="opacity" values=".3;.7;.3" dur="3.7s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle cx="1440" cy="35"  r="1.2" fill="#a855f7"><animate attributeName="opacity" values=".1;.8;.1" dur="4.1s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="1700" cy="110" r=".8" fill="white"><animate attributeName="opacity" values=".2;.9;.2" dur="2.6s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="260"  cy="200" r=".9" fill="white"><animate attributeName="opacity" values=".1;.6;.1" dur="6s"   repeatCount="indefinite" begin="3s"/></circle>
  <circle cx="1820" cy="160" r="1"  fill="#00e5bb"><animate attributeName="opacity" values=".2;.7;.2" dur="3.4s" repeatCount="indefinite" begin="2.5s"/></circle>
</g>

<!-- ═══ LAYER 2: DEMON WINGS (silhouette) ═══ -->
<!-- Left wing — large sweeping demonic shape -->
<path class="wing-l"
  d="M 960 1080
     C 880 900, 700 780, 500 620
     C 350 510, 160 430, 60 290
     C 120 350, 180 440, 220 530
     C 160 480, 90 410, 40 340
     C 80 460, 140 560, 200 640
     C 130 610, 60 570, 20 510
     C 60 640, 140 730, 240 800
     C 180 800, 90 780, 40 740
     C 100 860, 220 940, 380 990
     C 560 1040, 760 1065, 960 1080 Z"
  fill="#0a1628" filter="url(#wingBlur)" opacity="0.9"/>

<!-- Right wing -->
<path class="wing-r"
  d="M 960 1080
     C 1040 900, 1220 780, 1420 620
     C 1570 510, 1760 430, 1860 290
     C 1800 350, 1740 440, 1700 530
     C 1760 480, 1830 410, 1880 340
     C 1840 460, 1780 560, 1720 640
     C 1790 610, 1860 570, 1900 510
     C 1860 640, 1780 730, 1680 800
     C 1740 800, 1830 780, 1880 740
     C 1820 860, 1700 940, 1540 990
     C 1360 1040, 1160 1065, 960 1080 Z"
  fill="#0a1424" filter="url(#wingBlur)" opacity="0.9"/>

<!-- Wing vein details — left -->
<g opacity=".25" filter="url(#wingBlur)">
  <line x1="960" y1="1080" x2="300" y2="520" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="960" y1="1080" x2="140" y2="380" stroke="#7c3aed" stroke-width="1"/>
  <line x1="960" y1="1080" x2="480" y2="450" stroke="#7c3aed" stroke-width="1"/>
  <!-- right -->
  <line x1="960" y1="1080" x2="1620" y2="520" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="960" y1="1080" x2="1780" y2="380" stroke="#22c55e" stroke-width="1"/>
  <line x1="960" y1="1080" x2="1440" y2="450" stroke="#22c55e" stroke-width="1"/>
</g>

<!-- ═══ LAYER 3: ATMOSPHERIC GLOW ═══ -->
<rect width="1920" height="1080" fill="url(#wingL)"  class="wing-l"/>
<rect width="1920" height="1080" fill="url(#wingR)"  class="wing-r"/>
<rect width="1920" height="1080" fill="url(#portal)" class="portal-orb"/>

<!-- Rune rings around portal origin -->
<g opacity=".07">
  <circle class="rune1" cx="960" cy="1080" r="480" fill="none" stroke="#00e5bb" stroke-width="1.5" stroke-dasharray="10 22"/>
  <circle class="rune2" cx="960" cy="1080" r="560" fill="none" stroke="#7c3aed" stroke-width="1"   stroke-dasharray="5 30"/>
</g>

<!-- ═══ LAYER 4: WARRIOR SILHOUETTE ═══ -->
<!-- Armoured warrior standing at the portal — composed of simple SVG shapes -->
<g transform="translate(960,870)" opacity=".92" filter="url(#softBlur)">
  <!-- legs -->
  <rect x="-22" y="80" width="18" height="100" rx="4" fill="#0a1628"/>
  <rect x="4"   y="80" width="18" height="100" rx="4" fill="#0a1628"/>
  <!-- armour skirt -->
  <path d="M-28 80 L28 80 L34 130 L-34 130 Z" fill="#0b1a30"/>
  <!-- torso/chest -->
  <rect x="-26" y="10" width="52" height="72" rx="6" fill="#0b1a30"/>
  <!-- glowing chest piece -->
  <ellipse cx="0" cy="44" rx="10" ry="12" fill="#00e5bb" opacity=".35" filter="url(#softBlur)"/>
  <ellipse cx="0" cy="44" rx="5"  ry="6"  fill="#00e5bb" opacity=".7"/>
  <!-- pauldrons -->
  <ellipse cx="-34" cy="22" rx="16" ry="22" fill="#0c1e38"/>
  <ellipse cx="34"  cy="22" rx="16" ry="22" fill="#0c1e38"/>
  <!-- pauldron spikes -->
  <polygon points="-34,0 -40,-18 -28,-18" fill="#0d2244"/>
  <polygon points="34,0 28,-18 40,-18"    fill="#0d2244"/>
  <!-- arms -->
  <rect x="-52" y="14" width="16" height="58" rx="5" fill="#0a1628"/>
  <rect x="36"  y="14" width="16" height="58" rx="5" fill="#0a1628"/>
  <!-- weapon — large axe left hand -->
  <rect x="-62" y="-20" width="6" height="90" rx="2" fill="#1a2a44"/>
  <path d="M-82 -20 L-56 -20 L-56 20 L-82 20 C-96 10 -96 -10 -82 -20 Z" fill="#1a3a54" opacity=".9"/>
  <line x1="-78" y1="-18" x2="-78" y2="18" stroke="#00e5bb" stroke-width="1" opacity=".4"/>
  <!-- shield right hand -->
  <path d="M52 18 L70 22 L74 62 L62 72 L50 62 L46 22 Z" fill="#1a2a44"/>
  <path d="M58 26 L66 28 L68 56 L62 64 L56 56 L54 28 Z" fill="#0c1e38"/>
  <circle cx="62" cy="45" r="5" fill="#22c55e" opacity=".5"/>
  <!-- helmet -->
  <ellipse cx="0" cy="-10" rx="20" ry="22" fill="#0b1a30"/>
  <!-- helmet crest -->
  <path d="M-8,-30 C-6,-50 6,-50 8,-30 L6,-10 L-6,-10 Z" fill="#1a3050"/>
  <!-- visor glowing slits -->
  <rect x="-14" y="-16" width="10" height="3" rx="1.5" fill="#00e5bb" opacity=".8"/>
  <rect x="4"   y="-16" width="10" height="3" rx="1.5" fill="#00e5bb" opacity=".8"/>
  <!-- under-glow from portal on warrior -->
  <ellipse cx="0" cy="140" rx="40" ry="12" fill="#00e5bb" opacity=".25" filter="url(#softBlur)"/>
</g>

<!-- Subtle shadow/ground glow under warrior -->
<ellipse cx="960" cy="1010" rx="120" ry="25" fill="#00e5bb" opacity=".12" filter="url(#softBlur)" class="portal-orb"/>

<!-- ═══ LAYER 5: SCANLINE ═══ -->
<rect class="scan" x="0" y="-60" width="1920" height="2" fill="white" opacity=".025"/>

<!-- ═══ LAYER 6: FLOATING PARTICLES ═══ -->
<g filter="url(#pBlur)">
  <!-- teal -->
  <circle cx="310"  cy="980" r="2.5" fill="#00e5bb"><animate attributeName="cy" from="980" to="500" dur="9s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;.9;0" dur="9s"   repeatCount="indefinite"/></circle>
  <circle cx="560"  cy="1020" r="1.8" fill="#00e5bb"><animate attributeName="cy" from="1020" to="540" dur="11s" repeatCount="indefinite" begin="2s"/><animate attributeName="opacity" values="0;.7;0" dur="11s" begin="2s" repeatCount="indefinite"/></circle>
  <circle cx="820"  cy="990" r="3"   fill="#00e5bb"><animate attributeName="cy" from="990" to="480" dur="8s"   repeatCount="indefinite" begin="1s"/><animate attributeName="opacity" values="0;1;0"   dur="8s"   begin="1s" repeatCount="indefinite"/></circle>
  <circle cx="960"  cy="1050" r="2"  fill="#00e5bb"><animate attributeName="cy" from="1050" to="550" dur="12s" repeatCount="indefinite" begin="4s"/><animate attributeName="opacity" values="0;.8;0" dur="12s" begin="4s" repeatCount="indefinite"/></circle>
  <circle cx="1100" cy="1000" r="2.5" fill="#00e5bb"><animate attributeName="cy" from="1000" to="510" dur="10s" repeatCount="indefinite" begin="0.5s"/><animate attributeName="opacity" values="0;.9;0" dur="10s" begin="0.5s" repeatCount="indefinite"/></circle>
  <!-- purple -->
  <circle cx="1360" cy="970" r="2"  fill="#a855f7"><animate attributeName="cy" from="970" to="450" dur="9.5s" repeatCount="indefinite" begin="3s"/><animate attributeName="opacity" values="0;.7;0" dur="9.5s" begin="3s" repeatCount="indefinite"/></circle>
  <circle cx="1600" cy="1010" r="2.5" fill="#a855f7"><animate attributeName="cy" from="1010" to="530" dur="13s" repeatCount="indefinite" begin="1.5s"/><animate attributeName="opacity" values="0;.6;0" dur="13s" begin="1.5s" repeatCount="indefinite"/></circle>
  <!-- green -->
  <circle cx="170"  cy="950" r="1.8" fill="#22c55e"><animate attributeName="cy" from="950" to="450" dur="10s" repeatCount="indefinite" begin="5s"/><animate attributeName="opacity" values="0;.5;0" dur="10s" begin="5s" repeatCount="indefinite"/></circle>
  <circle cx="1750" cy="960" r="2"   fill="#22c55e"><animate attributeName="cy" from="960" to="500" dur="8.5s" repeatCount="indefinite" begin="7s"/><animate attributeName="opacity" values="0;.5;0" dur="8.5s" begin="7s" repeatCount="indefinite"/></circle>
</g>

<!-- ═══ LAYER 7: FRAME ORNAMENTS ═══ -->
<!-- Corner L-brackets with diamond tips -->
<g opacity=".9">
  <!-- Top-left -->
  <rect x="52" y="52"  width="220" height="2" fill="url(#lineGrad)" opacity=".7"/>
  <rect x="52" y="52"  width="2" height="160" fill="#00e5bb" opacity=".6"/>
  <rect x="52" y="52"  width="22" height="22" fill="none" stroke="#00e5bb" stroke-width="2"/>
  <polygon points="52,52 44,44 60,44" fill="#00e5bb" opacity=".8"/>
  <!-- Top-right -->
  <rect x="1648" y="52" width="220" height="2" fill="url(#lineGrad)" opacity=".7"/>
  <rect x="1866" y="52" width="2"   height="160" fill="#a855f7" opacity=".6"/>
  <rect x="1846" y="52" width="22"  height="22" fill="none" stroke="#a855f7" stroke-width="2"/>
  <polygon points="1868,52 1860,44 1876,44" fill="#a855f7" opacity=".8"/>
  <!-- Bottom-left -->
  <rect x="52" y="1026" width="220" height="2" fill="url(#lineGrad)" opacity=".7"/>
  <rect x="52" y="868"  width="2"   height="160" fill="#00e5bb" opacity=".6"/>
  <rect x="52" y="1006" width="22"  height="22" fill="none" stroke="#00e5bb" stroke-width="2"/>
  <polygon points="52,1028 44,1036 60,1036" fill="#00e5bb" opacity=".8"/>
  <!-- Bottom-right -->
  <rect x="1648" y="1026" width="220" height="2" fill="url(#lineGrad)" opacity=".7"/>
  <rect x="1866" y="868"  width="2"   height="160" fill="#a855f7" opacity=".6"/>
  <rect x="1846" y="1006" width="22"  height="22" fill="none" stroke="#a855f7" stroke-width="2"/>
  <polygon points="1868,1028 1860,1036 1876,1036" fill="#a855f7" opacity=".8"/>
</g>

<!-- Center top diamond -->
<g transform="translate(960,56)" opacity=".7">
  <polygon points="0,-14 14,0 0,14 -14,0" fill="none" stroke="#00e5bb" stroke-width="1.5"/>
  <polygon points="0,-7  7,0  0,7  -7,0"  fill="#00e5bb"/>
</g>

<!-- ═══ LAYER 8: MAIN TEXT ═══ -->

<!-- Channel name pill -->
<rect x="800" y="118" width="320" height="44" rx="22" fill="#00e5bb" opacity=".10"/>
<rect x="800" y="118" width="320" height="44" rx="22" fill="none" stroke="#00e5bb" stroke-width="1" opacity=".4"/>
<text x="960" y="147"
  text-anchor="middle"
  font-family="'Segoe UI','Arial Black',sans-serif"
  font-size="22" font-weight="700" letter-spacing="10"
  fill="#00e5bb" class="flicker">FREEGUYDH</text>

<!-- Top divider -->
<rect x="280" y="198" width="1360" height="1.5" fill="url(#lineGrad)" opacity=".6"/>
<polygon points="960,192 967,204 953,204" fill="url(#lineGrad)" opacity=".7"/>

<!-- STREAM STARTING — hero headline -->
<text x="960" y="360"
  text-anchor="middle"
  font-family="'Segoe UI','Arial Black',sans-serif"
  font-size="108" font-weight="900" letter-spacing="12"
  fill="url(#titleGrad)"
  filter="url(#bigGlow)"
  class="title-txt">STREAM STARTING</text>

<!-- SOON — mega accent word -->
<text x="960" y="530"
  text-anchor="middle"
  font-family="'Segoe UI','Arial Black',sans-serif"
  font-size="188" font-weight="900" letter-spacing="40"
  fill="url(#titleGrad)"
  filter="url(#bigGlow)"
  class="title-txt"
  opacity=".95">SOON</text>

<!-- Bottom divider -->
<rect x="280" y="610" width="1360" height="1.5" fill="url(#lineGrad)" opacity=".5"/>

<!-- Energy loading bar -->
<rect x="660" y="842" width="600" height="10" rx="5" fill="white" opacity=".06" class="bar-bg"/>
<rect x="660" y="842" height="10" rx="5" fill="url(#lineGrad)" clip-path="url(#barClip)" class="energy-bar"/>
<!-- bar label -->
<text x="960" y="830" text-anchor="middle"
  font-family="'Segoe UI',Arial,sans-serif"
  font-size="13" letter-spacing="5"
  fill="white" opacity=".35">GATHERING ENERGY</text>

<!-- Powered by Slate badge (below energy bar) -->
<g transform="translate(960, 878)" text-anchor="middle">
  <!-- Slate logo mark — simplified shield/S icon -->
  <g transform="translate(-62, -9)">
    <!-- Shield outline -->
    <path d="M0 0 L10 0 L10 14 Q5 18 0 14 Z" fill="none" stroke="url(#lineGrad)" stroke-width="1.2" opacity=".7"/>
    <!-- S letterform inside shield -->
    <text x="5" y="11" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif"
      font-size="8" font-weight="800"
      fill="url(#lineGrad)" opacity=".8">S</text>
  </g>
  <!-- "powered by" label -->
  <text x="-42" y="4"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="11" letter-spacing="2" font-weight="400"
    fill="white" opacity=".30">powered by</text>
  <!-- SLATE wordmark -->
  <text x="-42" y="18"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="16" letter-spacing="6" font-weight="700"
    fill="url(#lineGrad)" opacity=".70">SLATE</text>
</g>

<!-- Follow CTA -->
<text x="960" y="1040"
  text-anchor="middle"
  font-family="'Segoe UI',Arial,sans-serif"
  font-size="20" letter-spacing="5" font-weight="400"
  fill="white" opacity=".28">FOLLOW TO NEVER MISS A STREAM</text>
</svg>
